name: kalima

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: kalima
      POSTGRES_PASSWORD: kalima
      POSTGRES_DB: kalima
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalima -d kalima"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
